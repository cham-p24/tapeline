services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tapeline
      POSTGRES_PASSWORD: dev_only_change_me
      POSTGRES_DB: tapeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapeline"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://tapeline:dev_only_change_me@postgres:5432/tapeline
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile
    command: python -m app.workers.signal_publisher
    environment:
      DATABASE_URL: postgresql://tapeline:dev_only_change_me@postgres:5432/tapeline
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

volumes:
  pgdata:
