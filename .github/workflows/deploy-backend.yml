name: Deploy backend (Fly.io)

# Auto-deploys the FastAPI backend + worker to Fly.io on every push to main
# that touches backend code, the Docker image, or the Fly config. The frontend
# already auto-deploys via Vercel; this removes the LAST manual step
# (`fly deploy` from a laptop) so shipping is fully hands-off.
#
# It also closes a real failure mode: deploying from a dirty local checkout.
# That is how an uncommitted module (app.services.symbols) ended up imported by
# code on main while never being committed — the manual deploy "worked" locally
# but main was broken. With this workflow, MAIN is the single source of truth
# for what's deployed, and the test gate below refuses to deploy a main that
# can't even import / pass tests (which a direct-to-main push can otherwise slip
# past, since PR CI is bypassed).
#
# ── ONE-TIME SETUP (operator, ~60 seconds) ───────────────────────────────────
# Create a Fly deploy token and add it as a GitHub Actions secret:
#
#     fly tokens create deploy -a tapeline-backend        # copy the whole token
#
#   then: GitHub repo → Settings → Secrets and variables → Actions →
#         New repository secret → name = FLY_API_TOKEN, value = (paste).
#
# Until that secret exists this workflow still runs GREEN but SKIPS the deploy
# (it logs a notice), so it never blocks anything. The moment the secret is
# added, the next backend push to main deploys automatically — no other action
# ever needed.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/Dockerfile"
      - "fly.toml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}   # manual "deploy now" button in the Actions tab

concurrency:
  # Serialize deploys; never cancel an in-flight one (the release_command runs
  # `alembic upgrade head` — interrupting a migration mid-flight is unsafe).
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Backend test gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app
      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional
      - name: Tests (pytest)
        run: |
          cp ../.env.example ../.env
          pytest -x

  deploy:
    name: Deploy to Fly.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FAIL HARD when the token is missing. This used to skip-green "until the
      # operator adds FLY_API_TOKEN" — which silently froze prod for 12 days
      # (Jun 1-12, 2026): six PRs of revenue/stability fixes merged, every
      # deploy run reported SUCCESS, and nothing shipped. The secret is set
      # now (2026-06-13); if it ever disappears the deploy must go RED, not
      # green-but-no-op.
      - name: Check for deploy token
        id: gate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error title=Deploy BLOCKED::FLY_API_TOKEN secret is not set — prod is NOT receiving merges. Re-arm: fly tokens create deploy -a tapeline-backend, then gh secret set FLY_API_TOKEN."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      # Capture the running api machine's boot_time BEFORE deploying so the
      # post-deploy check can prove the machine actually cut over. The Jun
      # 1-9 era had a second silent failure mode: deploys "succeeded" but the
      # api machine never restarted (10s health grace too short), so any
      # 200-serving old machine passed the smoke check. boot_time advancing
      # is the only honest cutover signal.
      - name: Capture pre-deploy boot_time
        id: predeploy
        run: |
          pre=$(curl -s --max-time 20 "https://api.tapeline.io/api/version?cb=${GITHUB_RUN_ID}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('boot_time',''))" 2>/dev/null || echo "")
          echo "boot_time=$pre" >> "$GITHUB_OUTPUT"
          echo "pre-deploy boot_time: ${pre:-<unreachable>}"

      - name: Setup flyctl
        if: steps.gate.outputs.ready == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (remote build + alembic release_command)
        if: steps.gate.outputs.ready == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # --remote-only builds on Fly's builders (no Docker daemon needed in CI).
        # Uses the repo-root fly.toml -> infra/Dockerfile; the [deploy]
        # release_command runs `alembic upgrade head` before the new release
        # goes live, so migrations ship with the code automatically.
        run: flyctl deploy --remote-only --config fly.toml

      - name: Post-deploy smoke check
        if: steps.gate.outputs.ready == 'true'
        # Fail the deploy if prod isn't actually healthy after the release, so a
        # bad ship surfaces here instead of silently serving 5xx/404. Retries
        # cover the brief post-restart universe-warming window. Public endpoints
        # only — no secrets needed.
        run: |
          base="https://api.tapeline.io"
          code=000
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$base/api/status" || echo 000)
            [ "$code" = "200" ] && break
            echo "status attempt $i: $code — retrying in 10s"; sleep 10
          done
          [ "$code" = "200" ] || { echo "::error title=Smoke check failed::/api/status returned $code after deploy"; exit 1; }
          # 401 = the public API router is mounted and key-gated (i.e. live).
          # 404 would mean the build shipped without the api_v1 routes (the
          # exact regression the clobbered v128/v129 deploys caused).
          v1=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$base/api/v1/signals" || echo 000)
          [ "$v1" = "401" ] || { echo "::error title=Smoke check failed::/api/v1/signals returned $v1 (expected 401 = live + key-gated)"; exit 1; }
          # Cutover proof: boot_time must have ADVANCED past the pre-deploy
          # capture. A 200 from the OLD machine is not a successful deploy.
          pre="${{ steps.predeploy.outputs.boot_time }}"
          post=$(curl -s --max-time 20 "$base/api/version?cb=${GITHUB_RUN_ID}-post" | python3 -c "import sys,json;print(json.load(sys.stdin).get('boot_time',''))" 2>/dev/null || echo "")
          if [ -n "$pre" ] && [ -n "$post" ] && [ "$post" = "$pre" ]; then
            echo "::error title=Cutover failed::api machine boot_time unchanged ($post) — the old machine is still serving. Check 'fly machines list -a tapeline-backend' and the health-check grace period."
            exit 1
          fi
          echo "✅ Post-deploy smoke check passed (status 200, /api/v1 gated, boot_time ${pre:-?} → ${post:-?})."
