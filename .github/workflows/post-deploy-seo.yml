name: Post-deploy SEO ping

on:
  # Auto-trigger on every push to main that touches a public surface.
  # Vercel auto-deploys main pushes too, so by the time this job runs
  # (~20s after push-to-main lands), the new content is live and ready
  # to be pinged. Paths filter keeps the workflow quiet on commits
  # that don't change any public-indexable URL.
  push:
    branches: [main]
    paths:
      - "frontend/app/**"
      - "frontend/public/**"
      - "frontend/scripts/notify-search-engines.mjs"

  # Manually trigger after a deploy from the Actions tab.
  workflow_dispatch:
    inputs:
      urls:
        description: "Optional space-separated URLs to ping. If empty, the full sitemap is re-announced."
        required: false
        default: ""

  # Daily safety net — even on quiet deploy weeks, re-announce the
  # sitemap so newly-discovered tickers and updated lastmod dates
  # propagate. Cron is best-effort under GitHub Actions load.
  schedule:
    - cron: "0 14 * * *" # 14:00 UTC daily (≈10am ET, post-open)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ping search engines
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://tapeline.io' }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -n "${{ inputs.urls }}" ]; then
            node frontend/scripts/notify-search-engines.mjs ${{ inputs.urls }}
          else
            node frontend/scripts/notify-search-engines.mjs
          fi
