name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Copy-compliance gate. Blocks any change that reintroduces a performance
  # claim, an evaluative adjective on a security, manufactured urgency, or a
  # vs-SPY figure in a headline slot. See docs/COMPLIANCE_COPY_RULES.md.
  #
  # Runs first and depends on nothing: no npm install, no pip, no lockfile —
  # bare Node, so it stays fast and cannot be broken by an unrelated dependency
  # problem. A compliance gate that is flaky is a compliance gate that gets
  # marked non-required.
  copy-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Linter self-tests
        run: node --test scripts/lint-copy-compliance.test.mjs
      - name: Copy-compliance lint
        run: node scripts/lint-copy-compliance.mjs

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app
      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports --no-strict-optional
      - name: Tests (pytest)
        run: |
          cp ../.env.example ../.env
          pytest -x

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
