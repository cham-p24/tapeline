# Fly.io configuration for Tapeline backend (API + worker).
# Deploy with:  cd C:\Project 1; fly launch --copy-config  (first time)  or  fly deploy
app = "tapeline-backend"
primary_region = "syd"              # Sydney — lowest latency for Melbourne founder

[build]
  dockerfile = "infra/Dockerfile"

[env]
  APP_ENV = "production"
  APP_URL = "https://tapeline.io"
  API_URL = "https://api.tapeline.io"
  SCORE_REFRESH_SECONDS = "60"

# Secrets set via:  fly secrets set MASSIVE_API_KEY=xxx ...
# Required secrets (set before deploy):
#   SESSION_SECRET  <-- signs every session cookie + the 2FA challenge token.
#     If unset, services/session.py derives the key from STRIPE_WEBHOOK_SECRET,
#     and if that is unset too it falls back to a constant hardcoded in this
#     public repo (i.e. anyone can forge any user's session). Generate with:
#       fly secrets set SESSION_SECRET=$(openssl rand -hex 32) -a tapeline-backend
#     Setting or changing it signs every user out once — do it in a quiet window.
#   DATABASE_URL (from Supabase or Neon)
#   MASSIVE_API_KEY  (or legacy POLYGON_API_KEY during the rebrand grace period)
#   FINNHUB_API_KEY, FRED_API_KEY  (optional but enable real fundamentals + macro)
#   CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY, CLERK_WEBHOOK_SECRET, CLERK_ISSUER_URL
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_PRO_MONTHLY/ANNUAL, STRIPE_PRICE_PREMIUM_MONTHLY/ANNUAL
#   RESEND_API_KEY
#   VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT  (web push)
#   ADMIN_API_KEY

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["api"]    # only the api process serves HTTP; worker is background-only

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    method = "get"
    path = "/api/health"
    # 10s → 60s (2026-06-09): a fresh api machine was failing the rollout
    # health check before it finished warming up (uvicorn boot + first Neon
    # connection through a scale-to-zero cold-start can exceed 10s), so Fly
    # aborted the cutover every deploy and left the OLD machine running —
    # which is why /api/version's boot_time was frozen days behind HEAD.
    # 60s gives the cold-start room so deploys actually replace the machine.
    grace_period = "60s"

# Two processes: API and worker share the same image
[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "python -m app.workers.signal_publisher"

# API machine bumped 2026-06-01 from shared-cpu-1x:512mb after two prod wedges
# in one session: the no-DB /api/health endpoint timed out, i.e. the event loop
# starved while requests piled up behind a slow/cold Neon. More CPU lets the
# single machine churn the backlog + recover instead of fully stalling; the RAM
# headroom avoids GC thrash at 512mb. NOTE: the *root* cause is Neon scale-to-
# zero cold-starts — disable autosuspend / bump compute in the Neon dashboard.
# Deliberately NOT adding a 2nd api machine: each adds pool_size+overflow (~30)
# connections, and more connections to a cold/limited Neon makes the stall worse.
[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 2
  processes = ["api"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]

[deploy]
  release_command = "alembic upgrade head"
